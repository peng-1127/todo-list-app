<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List - 智能任务管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-900: #111827;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: var(--shadow-xl);
            overflow: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
            position: relative;
            z-index: 1;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px 40px;
            background: var(--gray-50);
            border-bottom: 1px solid var(--gray-200);
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s;
        }

        .stat-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 13px;
            color: var(--gray-600);
            font-weight: 500;
        }

        /* Input Section */
        .input-section {
            padding: 30px 40px;
            border-bottom: 1px solid var(--gray-200);
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        #taskInput {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid var(--gray-200);
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
            font-family: inherit;
        }

        #taskInput:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        #addBtn {
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        #addBtn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        #addBtn:active {
            transform: translateY(0);
        }

        /* Selectors */
        .selectors {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .selector-group {
            background: var(--gray-50);
            padding: 16px;
            border-radius: 12px;
        }

        .selector-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-600);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .priority-selector, .category-selector {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .priority-option, .category-option {
            padding: 8px 14px;
            border: 2px solid var(--gray-200);
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
            background: white;
        }

        .priority-option:hover, .category-option:hover {
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        .priority-option.selected, .category-option.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .priority-option.high.selected { background: var(--danger); border-color: var(--danger); }
        .priority-option.medium.selected { background: var(--warning); border-color: var(--warning); }
        .priority-option.low.selected { background: var(--success); border-color: var(--success); }

        /* Due Date */
        .due-date-group {
            background: var(--gray-50);
            padding: 16px;
            border-radius: 12px;
        }

        #dueDateInput {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--gray-200);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s;
        }

        #dueDateInput:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Filter Bar */
        .filter-bar {
            padding: 16px 40px;
            background: white;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid var(--gray-200);
            border-radius: 20px;
            background: white;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
            font-family: inherit;
        }

        .filter-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Task List */
        .task-list {
            padding: 30px 40px;
            max-height: 500px;
            overflow-y: auto;
        }

        .task-list::-webkit-scrollbar {
            width: 8px;
        }

        .task-list::-webkit-scrollbar-track {
            background: var(--gray-100);
            border-radius: 4px;
        }

        .task-list::-webkit-scrollbar-thumb {
            background: var(--gray-300);
            border-radius: 4px;
        }

        .task-list::-webkit-scrollbar-thumb:hover {
            background: var(--gray-600);
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            padding: 20px;
            background: var(--gray-50);
            border-radius: 16px;
            margin-bottom: 12px;
            border-left: 4px solid var(--gray-300);
            transition: all 0.3s;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .task-item:hover {
            background: white;
            box-shadow: var(--shadow-md);
            transform: translateX(4px);
        }

        .task-item.completed {
            opacity: 0.6;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--gray-600);
        }

        .task-item.priority-high { border-left-color: var(--danger); }
        .task-item.priority-medium { border-left-color: var(--warning); }
        .task-item.priority-low { border-left-color: var(--success); }

        .task-checkbox {
            width: 22px;
            height: 22px;
            margin-right: 16px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .task-content {
            flex: 1;
        }

        .task-text {
            font-size: 16px;
            color: var(--gray-900);
            margin-bottom: 10px;
            font-weight: 500;
        }

        .task-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .task-tag {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .task-category {
            background: var(--primary);
            color: white;
        }

        .task-priority {
            background: var(--gray-200);
            color: var(--gray-700);
        }

        .task-priority.high {
            background: #fee2e2;
            color: var(--danger);
        }

        .task-priority.medium {
            background: #fef3c7;
            color: var(--warning);
        }

        .task-priority.low {
            background: #d1fae5;
            color: var(--success);
        }

        .task-due-date {
            background: #fee2e2;
            color: var(--danger);
            font-weight: 700;
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-red {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .delete-btn {
            padding: 8px 16px;
            background: white;
            color: var(--danger);
            border: 2px solid var(--danger);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
            font-family: inherit;
        }

        .delete-btn:hover {
            background: var(--danger);
            color: white;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray-600);
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-state p {
            font-size: 16px;
            color: var(--gray-600);
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 20px 12px;
            }

            .header {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .stats-bar {
                grid-template-columns: 1fr;
                gap: 12px;
                padding: 16px 20px;
            }

            .input-section, .task-list {
                padding: 20px;
            }

            .filter-bar {
                padding: 12px 20px;
            }

            .selectors {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 Todo List</h1>
            <p>智能任务管理 · 高效完成每一天</p>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-number" id="totalTasks">0</div>
                <div class="stat-label">总任务</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="completedTasks">0</div>
                <div class="stat-label">已完成</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="overdueTasks">0</div>
                <div class="stat-label">已过期</div>
            </div>
        </div>

        <div class="input-section">
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="输入新任务..." maxlength="100">
                <button id="addBtn">添加任务</button>
            </div>

            <div class="selectors">
                <div class="selector-group">
                    <div class="selector-label">优先级</div>
                    <div class="priority-selector">
                        <div class="priority-option" data-priority="low">🟢 低</div>
                        <div class="priority-option selected" data-priority="medium">🟡 中</div>
                        <div class="priority-option" data-priority="high">🔴 高</div>
                    </div>
                </div>

                <div class="selector-group">
                    <div class="selector-label">分类</div>
                    <div class="category-selector">
                        <div class="category-option selected" data-category="work">💼 工作</div>
                        <div class="category-option" data-category="personal">🏠 生活</div>
                        <div class="category-option" data-category="study">📚 学习</div>
                        <div class="category-option" data-category="shopping">🛒 购物</div>
                    </div>
                </div>
            </div>

            <div class="due-date-group">
                <div class="selector-label">📅 截止日期（可选）</div>
                <input type="datetime-local" id="dueDateInput">
            </div>
        </div>

        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="active">待完成</button>
            <button class="filter-btn" data-filter="completed">已完成</button>
            <button class="filter-btn" data-filter="overdue">🔴 已过期</button>
            <button class="filter-btn" data-filter="today">📅 今天</button>
        </div>

        <div class="task-list" id="taskList">
            <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M9 11l3 3L22 4"/>
                    <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
                </svg>
                <p>暂无任务，添加一个开始吧！</p>
            </div>
        </div>
    </div>

    <script>
        class TodoApp {
            constructor() {
                this.tasks = this.loadTasks();
                this.currentPriority = 'medium';
                this.currentCategory = 'work';
                this.currentFilter = 'all';
                this.init();
                this.checkOverdue();
                this.updateStats();
            }

            init() {
                this.taskInput = document.getElementById('taskInput');
                this.addBtn = document.getElementById('addBtn');
                this.taskList = document.getElementById('taskList');
                this.dueDateInput = document.getElementById('dueDateInput');

                this.addBtn.addEventListener('click', () => this.addTask());
                this.taskInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.addTask();
                });

                document.querySelectorAll('.priority-option').forEach(option => {
                    option.addEventListener('click', (e) => {
                        document.querySelectorAll('.priority-option').forEach(o => o.classList.remove('selected'));
                        e.target.classList.add('selected');
                        this.currentPriority = e.target.dataset.priority;
                    });
                });

                document.querySelectorAll('.category-option').forEach(option => {
                    option.addEventListener('click', (e) => {
                        document.querySelectorAll('.category-option').forEach(o => o.classList.remove('selected'));
                        e.target.classList.add('selected');
                        this.currentCategory = e.target.dataset.category;
                    });
                });

                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.currentFilter = e.target.dataset.filter;
                        this.render();
                    });
                });

                this.render();
            }

            loadTasks() {
                const saved = localStorage.getItem('todo-tasks-v3');
                return saved ? JSON.parse(saved) : [];
            }

            saveTasks() {
                localStorage.setItem('todo-tasks-v3', JSON.stringify(this.tasks));
            }

            addTask() {
                const text = this.taskInput.value.trim();
                if (!text) {
                    alert('请输入任务内容！');
                    return;
                }

                const task = {
                    id: Date.now(),
                    text: text,
                    completed: false,
                    priority: this.currentPriority,
                    category: this.currentCategory,
                    dueDate: this.dueDateInput.value || null,
                    createdAt: new Date().toISOString()
                };

                this.tasks.push(task);
                this.saveTasks();
                this.taskInput.value = '';
                this.dueDateInput.value = '';
                this.render();
                this.updateStats();
            }

            toggleTask(id) {
                const task = this.tasks.find(t => t.id === id);
                if (task) {
                    task.completed = !task.completed;
                    task.completedAt = task.completed ? new Date().toISOString() : null;
                    this.saveTasks();
                    this.render();
                    this.updateStats();
                }
            }

            deleteTask(id) {
                this.tasks = this.tasks.filter(t => t.id !== id);
                this.saveTasks();
                this.render();
                this.updateStats();
            }

            checkOverdue() {
                const now = new Date();
                this.tasks.forEach(task => {
                    if (task.dueDate && !task.completed) {
                        const due = new Date(task.dueDate);
                        task.isOverdue = due < now;
                    }
                });
                this.saveTasks();
            }

            updateStats() {
                const stats = this.getStats();
                document.getElementById('totalTasks').textContent = stats.total;
                document.getElementById('completedTasks').textContent = stats.completed;
                document.getElementById('overdueTasks').textContent = stats.overdue;
            }

            getFilteredTasks() {
                let filtered = [...this.tasks];
                const now = new Date();

                switch (this.currentFilter) {
                    case 'active':
                        filtered = filtered.filter(t => !t.completed);
                        break;
                    case 'completed':
                        filtered = filtered.filter(t => t.completed);
                        break;
                    case 'overdue':
                        filtered = filtered.filter(t => t.isOverdue && !t.completed);
                        break;
                    case 'today':
                        const today = now.toISOString().split('T')[0];
                        filtered = filtered.filter(t => {
                            if (!t.dueDate) return false;
                            return t.dueDate.startsWith(today);
                        });
                        break;
                }

                return filtered;
            }

            getStats() {
                const total = this.tasks.length;
                const completed = this.tasks.filter(t => t.completed).length;
                const overdue = this.tasks.filter(t => t.isOverdue && !t.completed).length;
                return { total, completed, overdue };
            }

            getCategoryName(id) {
                const categories = {
                    work: '💼 工作',
                    personal: '🏠 生活',
                    study: '📚 学习',
                    shopping: '🛒 购物'
                };
                return categories[id] || '📌 其他';
            }

            getCategoryColor(id) {
                const colors = {
                    work: '#6366f1',
                    personal: '#10b981',
                    study: '#8b5cf6',
                    shopping: '#f59e0b'
                };
                return colors[id] || '#6b7280';
            }

            getPriorityName(priority) {
                const names = {
                    high: '🔴 高',
                    medium: '🟡 中',
                    low: '🟢 低'
                };
                return names[priority] || '🟡 中';
            }

            formatDueDate(dueDate) {
                if (!dueDate) return null;
                
                const due = new Date(dueDate);
                const now = new Date();
                const diff = due - now;
                
                const dateStr = due.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
                const timeStr = due.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                
                if (diff < 0) {
                    return { text: `已过期 ${dateStr}`, overdue: true };
                } else if (diff < 24 * 60 * 60 * 1000) {
                    return { text: `今天 ${timeStr}`, overdue: false };
                } else if (diff < 48 * 60 * 60 * 1000) {
                    return { text: `明天 ${timeStr}`, overdue: false };
                } else {
                    return { text: `${dateStr} ${timeStr}`, overdue: false };
                }
            }

            render() {
                const filtered = this.getFilteredTasks();

                if (filtered.length === 0) {
                    this.taskList.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M9 11l3 3L22 4"/>
                                <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
                            </svg>
                            <p>暂无任务，添加一个开始吧！</p>
                        </div>
                    `;
                    return;
                }

                this.taskList.innerHTML = filtered.map(task => {
                    const dueDateInfo = this.formatDueDate(task.dueDate);
                    return `
                        <div class="task-item ${task.completed ? 'completed' : ''} priority-${task.priority}">
                            <input 
                                type="checkbox" 
                                class="task-checkbox" 
                                ${task.completed ? 'checked' : ''}
                                onchange="app.toggleTask(${task.id})"
                            >
                            <div class="task-content">
                                <div class="task-text">${this.escapeHtml(task.text)}</div>
                                <div class="task-meta">
                                    <span class="task-tag task-category" style="background-color: ${this.getCategoryColor(task.category)}">
                                        ${this.getCategoryName(task.category)}
                                    </span>
                                    <span class="task-tag task-priority ${task.priority}">
                                        ${this.getPriorityName(task.priority)}
                                    </span>
                                    ${dueDateInfo ? `
                                        <span class="task-tag task-due-date ${dueDateInfo.overdue ? 'overdue' : ''}">
                                            📅 ${dueDateInfo.text}
                                        </span>
                                    ` : ''}
                                </div>
                            </div>
                            <button class="delete-btn" onclick="app.deleteTask(${task.id})">删除</button>
                        </div>
                    `;
                }).join('');
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }

        const app = new TodoApp();
    </script>
</body>
</html>
